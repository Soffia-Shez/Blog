<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Publicación</title>
    <link rel="stylesheet" href = '/static/style.css'>
</head>
<body>
    <div class="auth-container"> <h1>Editar Publicación</h1>
        <p>Estás editando el post ID: {{ post_id }}</p>

        <form method="POST" action="{{ url_for('edit_post', post_id=post_id) }}">

            <div class="formulario">

                <label for="title">Título:</label>
                <input type="text" id="title" name="title" value="{{ title }}" required>

                <label for="content">Contenido:</label>
                <textarea id="content" name="content" rows="10" required>{{ content }}</textarea>

                <button type="submit" class="btn">Guardar Cambios</button>
            </div>
        </form>

        <br>
        <a href="{{ url_for('blog') }}" class="btn">Cancelar y Volver</a>
    </div>
</body>
</html>
